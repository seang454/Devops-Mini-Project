---
# ============================================================
# Role: common
# Purpose: Install base software on ALL machines
#   - Docker & Docker Compose
#   - Oh My Zsh
#   - Portainer (agent/standalone)
# ============================================================

# ---- System Update ----
- name: Update and upgrade apt packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600
  become: true

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - git
      - wget
      - unzip
      - zsh
      - software-properties-common
      - python3-pip
    state: present
  become: true

# ---- Docker Installation ----
- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download Docker GPG key
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
        -o /etc/apt/keyrings/docker.asc && \
      chmod a+r /etc/apt/keyrings/docker.asc
    creates: /etc/apt/keyrings/docker.asc
  become: true

- name: Add Docker apt repository
  ansible.builtin.shell:
    cmd: |
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
      https://download.docker.com/linux/ubuntu \
      $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
      | tee /etc/apt/sources.list.d/docker.list > /dev/null
    creates: /etc/apt/sources.list.d/docker.list
  become: true

- name: Install Docker CE, CLI, Containerd, Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present
  become: true

- name: Ensure Docker service is started and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  become: true

- name: Add admin user to docker group
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: docker
    append: true
  become: true

# ---- Oh My Zsh ----
- name: Check if Oh My Zsh is already installed
  ansible.builtin.stat:
    path: "/home/{{ admin_user }}/.oh-my-zsh"
  register: ohmyzsh_stat

- name: Install Oh My Zsh (unattended)
  ansible.builtin.shell:
    cmd: |
      RUNZSH=no CHSH=yes sh -c \
      "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
  become: true
  become_user: "{{ admin_user }}"
  when: not ohmyzsh_stat.stat.exists

- name: Set Oh My Zsh theme in .zshrc
  ansible.builtin.lineinfile:
    path: "/home/{{ admin_user }}/.zshrc"
    regexp: '^ZSH_THEME='
    line: 'ZSH_THEME="{{ ohmyzsh_theme }}"'
  become: true

- name: Set zsh as default shell for admin user
  ansible.builtin.user:
    name: "{{ admin_user }}"
    shell: /bin/zsh
  become: true

# ---- Portainer ----
- name: Create Portainer Docker volume
  community.docker.docker_volume:
    name: portainer_data
    state: present
  become: true

- name: Run Portainer container
  community.docker.docker_container:
    name: portainer
    image: "portainer/portainer-ce:{{ portainer_version }}"
    state: started
    restart_policy: always
    ports:
      - "8000:8000"
      - "9443:9443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "portainer_data:/data"
  become: true
