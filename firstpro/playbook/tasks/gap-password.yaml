# ─────────────────────────────────────────
# Resolve domains from the correct hosts
# ─────────────────────────────────────────
- name: Set domain facts from hostvars
  ansible.builtin.set_fact:
    _jenkins_domain:   "{{ hostvars['master01']['jenkins_domain'] }}"
    _sonarqube_domain: "{{ hostvars['master02']['sonarqube_domain'] }}"
    _nexus_domain:     "{{ hostvars['master03']['nexus_domain'] }}"

# ─────────────────────────────────────────
# WAIT FOR JENKINS
# ─────────────────────────────────────────
- name: Wait for Jenkins to respond on HTTPS
  ansible.builtin.uri:
    url: "https://{{ _jenkins_domain }}/login"
    method: GET
    status_code: 200
    validate_certs: true
  register: jenkins_health
  until: jenkins_health.status == 200
  retries: "{{ health_check_retries }}"
  delay: "{{ health_check_delay }}"

- name: Confirm Jenkins is fully up
  ansible.builtin.debug:
    msg: "✅ Jenkins is UP at https://{{ _jenkins_domain }}"

# ─────────────────────────────────────────
# WAIT FOR NEXUS
# ─────────────────────────────────────────
- name: Wait for Nexus REST API to be ready
  ansible.builtin.uri:
    url: "https://{{ _nexus_domain }}/service/rest/v1/status"
    method: GET
    status_code: 200
    validate_certs: true
  register: nexus_health
  until: nexus_health.status == 200
  retries: "{{ health_check_retries }}"
  delay: "{{ health_check_delay }}"

- name: Confirm Nexus is fully up
  ansible.builtin.debug:
    msg: "✅ Nexus is UP at https://{{ _nexus_domain }}"

# ─────────────────────────────────────────
# WAIT FOR SONARQUBE
# ─────────────────────────────────────────
- name: Wait for SonarQube API to respond
  ansible.builtin.uri:
    url: "https://{{ _sonarqube_domain }}/api/system/status"
    method: GET
    status_code: 200
    validate_certs: true
    return_content: true
  register: sonarqube_health
  until:
    - sonarqube_health.status == 200
    - sonarqube_health.json is defined
    - sonarqube_health.json.status == "UP"
  retries: "{{ health_check_retries }}"
  delay: "{{ health_check_delay }}"

- name: Confirm SonarQube is fully up
  ansible.builtin.debug:
    msg: "✅ SonarQube is UP at https://{{ _sonarqube_domain }} — Status: {{ sonarqube_health.json.status }}"

# ─────────────────────────────────────────
# DISCOVER REAL CONTAINER NAMES
# ─────────────────────────────────────────
- name: Find Jenkins container name
  ansible.builtin.shell: |
    docker ps --format '{% raw %}{{.Names}}{% endraw %}' --filter "name=^jenkins-blueocean$" | head -1
  register: jenkins_container_name
  changed_when: false
  delegate_to: master01
  become: true

- name: Find Nexus container name by image
  ansible.builtin.shell: |
    docker ps --format '{% raw %}{{.Names}}{% endraw %}' --filter "ancestor={{ hostvars['master03']['nexus_image'] }}" | head -1
  register: nexus_container_name
  changed_when: false
  delegate_to: master03
  become: true

- name: Find SonarQube container name by image
  ansible.builtin.shell: |
    docker ps --format '{% raw %}{{.Names}}{% endraw %}' --filter "ancestor={{ hostvars['master02']['sonarqube_image'] }}" | head -1
  register: sonarqube_container_name
  changed_when: false
  delegate_to: master02
  become: true

- name: Show discovered container names
  ansible.builtin.debug:
    msg:
      - "Jenkins   container : {{ jenkins_container_name.stdout | default('NOT FOUND') }}"
      - "Nexus     container : {{ nexus_container_name.stdout | default('NOT FOUND') }}"
      - "SonarQube container : {{ sonarqube_container_name.stdout | default('NOT FOUND') }}"

# ─────────────────────────────────────────
# GRAB PASSWORDS USING DISCOVERED NAMES
# ─────────────────────────────────────────
- name: Read Jenkins initial admin password
  ansible.builtin.command:
    cmd: "docker exec {{ jenkins_container_name.stdout }} cat /var/jenkins_home/secrets/initialAdminPassword"
  register: jenkins_password
  changed_when: false
  ignore_errors: true
  delegate_to: master01
  become: true
  when: jenkins_container_name.stdout != ""

- name: Read Nexus initial admin password
  ansible.builtin.command:
    cmd: "docker exec {{ nexus_container_name.stdout }} cat /nexus-data/admin.password"
  register: nexus_password
  changed_when: false
  ignore_errors: true
  delegate_to: master03
  become: true
  when: nexus_container_name.stdout != ""

- name: Check SonarQube container is running
  ansible.builtin.command:
    cmd: "docker inspect -f '{{ '{{' }}.State.Running{{ '}}' }}' {{ sonarqube_container_name.stdout }}"
  register: sonarqube_running
  changed_when: false
  ignore_errors: true
  delegate_to: master02
  become: true
  when: sonarqube_container_name.stdout != ""

# ─────────────────────────────────────────
# PRINT SUMMARY
# ─────────────────────────────────────────
- name: Print credentials summary
  ansible.builtin.debug:
    msg:
      - "============================================"
      - "           CREDENTIALS SUMMARY             "
      - "============================================"
      - ""
      - ">> JENKINS"
      - "   URL      : https://{{ _jenkins_domain }}"
      - "   Container : {{ jenkins_container_name.stdout | default('NOT FOUND') }}"
      - "   Username  : admin"
      - "   Password  : {{ jenkins_password.stdout | default('ALREADY CHANGED or FILE NOT FOUND') }}"
      - ""
      - ">> NEXUS"
      - "   URL      : https://{{ _nexus_domain }}"
      - "   Container : {{ nexus_container_name.stdout | default('NOT FOUND') }}"
      - "   Username  : admin"
      - "   Password  : {{ nexus_password.stdout | default('ALREADY CHANGED or FILE NOT FOUND') }}"
      - ""
      - ">> SONARQUBE"
      - "   URL      : https://{{ _sonarqube_domain }}"
      - "   Container : {{ sonarqube_container_name.stdout | default('NOT FOUND') }}"
      - "   Username  : admin"
      - "   Password  : admin  (default — change on first login)"
      - "   Running   : {{ sonarqube_running.stdout | default('ERROR') }}"
      - ""
      - "============================================"

# ─────────────────────────────────────────
# SAVE TO LOCAL FILE
# ─────────────────────────────────────────
- name: Save credentials to local file
  ansible.builtin.copy:
    content: |
      ============================================
                 CREDENTIALS SUMMARY
      ============================================

      JENKINS
        URL      : https://{{ _jenkins_domain }}
        Container: {{ jenkins_container_name.stdout | default('NOT FOUND') }}
        Username : admin
        Password : {{ jenkins_password.stdout | default('ALREADY CHANGED or FILE NOT FOUND') }}

      NEXUS
        URL      : https://{{ _nexus_domain }}
        Container: {{ nexus_container_name.stdout | default('NOT FOUND') }}
        Username : admin
        Password : {{ nexus_password.stdout | default('ALREADY CHANGED or FILE NOT FOUND') }}

      SONARQUBE
        URL      : https://{{ _sonarqube_domain }}
        Container: {{ sonarqube_container_name.stdout | default('NOT FOUND') }}
        Username : admin
        Password : admin (default)

      Generated : {{ ansible_date_time.iso8601 }}
      ============================================
    dest: ./credentials_output.txt
    mode: "0600"