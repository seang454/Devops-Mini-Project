[defaults]
inventory           = inventory.ini
roles_path          = roles
host_key_checking   = False
retry_files_enabled = False
vault_password_file = secret/secret.txt
deprecation_warnings = False

# FIX: 'stdout_callback = yaml' was a community.general plugin removed in v12.0.0
# Use the built-in default callback with yaml result_format instead (ansible-core 2.13+)
stdout_callback     = ansible.builtin.default
result_format       = yaml

# Shows task results even for ok/skipped tasks (optional but useful for debugging)
show_per_host_start = True

interpreter_python  = auto_silent

[privilege_escalation]
become              = True
become_method       = sudo
become_ask_pass     = False

[ssh_connection]
pipelining          = True
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s